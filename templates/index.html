<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Tweaker</title>
</head>
<body>
    <h1>Resume Tweaker</h1>
    <form method="post" enctype="multipart/form-data">
        <label for="job-descript">Job Description:</label>
        <input type="text" id="job-descript" name="job_descript" required>
        
        <label for="fileInput">File Input:</label>
        <input type="file" id="fileInput" name="file_Input" accept=".pdf,.docx" required>
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
